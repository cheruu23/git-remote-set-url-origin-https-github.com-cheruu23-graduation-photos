<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/gallery.css" />
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
</div>

<!-- GRADUATION splash -->
<div id="hero-splash" style="display:none">
  <div id="confetti"></div>
  <div class="splash-content">
    <div class="cap-icon">🎓</div>
    <h1 id="grad-name"></h1>
    <p class="hero-sub">Congratulations!</p>
    <div class="gold-line"></div>
  </div>
</div>

<!-- WEDDING splash -->
<div id="wedding-splash" style="display:none">
  <div id="petals"></div>
  <div class="wedding-splash-content">
    <div class="rings-icon">💍</div>
    <h1 id="wedding-name"></h1>
    <p class="wedding-slogan" id="wedding-slogan-text"></p>
    <div class="rose-line"></div>
    <p class="wedding-date-text" id="wedding-date-display"></p>
  </div>
</div>

<!-- ── MOBILE ── -->
<div id="mobile-view">
  <div class="ig-topbar">
    <span class="ig-logo" id="ig-logo">🎓</span>
    <span class="ig-username" id="ig-username"></span>
  </div>
  <div id="ig-feed"></div>
</div>

<!-- ── DESKTOP ── -->
<div id="desktop-view">
  <header class="d-hero" id="d-hero">
    <div class="d-hero-bg" id="d-hero-bg"></div>
    <div id="confetti-d"></div>
    <div id="petals-d"></div>
    <div class="d-hero-content">
      <div class="cap-icon" id="d-hero-icon">🎓</div>
      <h1 id="grad-name-desktop"></h1>
      <p class="hero-sub" id="d-hero-sub">Congratulations on your graduation!</p>
      <div class="gold-line" id="d-hero-line"></div>
      <p class="wedding-date-text" id="d-wedding-date" style="display:none"></p>
    </div>
  </header>
  <div id="d-feed"></div>
</div>

<!-- ── COMMENT SHEET (mobile) ── -->
<div class="comment-sheet" id="comment-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span>Comments</span>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-comments" id="sheet-comments"></div>
  <div class="sheet-input-row">
    <input type="text" id="sheet-name" placeholder="Your name" />
    <input type="text" id="sheet-msg" placeholder="Add a comment..." />
    <button id="sheet-post" onclick="postSheetComment()">Post</button>
  </div>
</div>
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<script src="/gallery.js"></script>
</body>
</html>
