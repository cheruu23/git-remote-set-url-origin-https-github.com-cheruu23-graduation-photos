<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Graduation Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #0f0f0f;
      --gold: #f0c040;
      --accent: #e94560;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Loading ── */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; gap: 1rem;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #333;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Hero splash ── */
    #hero-splash {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99; text-align: center; padding: 2rem;
      animation: fadeOut 0.6s 2.8s forwards;
    }
    @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }

    #hero-splash .cap { font-size: 4rem; animation: bounceIn 0.7s ease; }
    #hero-splash h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: #fff; margin-top: 0.8rem;
      animation: fadeUp 0.6s 0.3s both;
    }
    #hero-splash p {
      color: var(--gold); font-size: 0.95rem;
      letter-spacing: 0.08em; margin-top: 0.5rem;
      animation: fadeUp 0.6s 0.5s both;
    }
    .gold-line {
      width: 0; height: 3px; background: var(--gold);
      border-radius: 2px; margin: 1rem auto 0;
      animation: expandW 0.5s 0.8s forwards;
    }
    @keyframes expandW { to { width: 60px; } }
    @keyframes bounceIn {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Confetti ── */
    #confetti {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 98; overflow: hidden;
    }
    .cp {
      position: absolute; top: -10px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    /* ── Slides container ── */
    #slides {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
    }
    #slides::-webkit-scrollbar { display: none; }

    /* ── Single slide ── */
    .slide {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      display: flex; flex-direction: column;
    }

    /* Photo fills top portion */
    .slide-img {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
    }
    .slide-img img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Counter badge */
    .slide-counter {
      position: absolute; top: 1rem; right: 1rem;
      background: rgba(0,0,0,0.55);
      color: #fff; font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 20px; backdrop-filter: blur(4px);
    }

    /* Caption */
    .slide-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: #fff; font-size: 0.85rem;
      padding: 1.5rem 1rem 0.6rem;
      font-style: italic;
    }

    /* ── Bottom panel ── */
    .slide-panel {
      background: #111;
      padding: 0.7rem 1rem 0.5rem;
      flex-shrink: 0;
    }

    .panel-actions {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 0.6rem;
    }

    .like-btn {
      display: flex; align-items: center; gap: 0.35rem;
      background: none; border: none; color: #fff;
      font-size: 1.5rem; cursor: pointer;
      transition: transform 0.15s;
    }
    .like-btn:active { transform: scale(1.3); }
    .like-btn.liked .heart { animation: heartPop 0.3s ease; }
    @keyframes heartPop {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.5); }
    }
    .like-count { font-size: 0.85rem; color: #ccc; }

    .comment-toggle {
      background: none; border: none; color: #ccc;
      font-size: 1.3rem; cursor: pointer;
      display: flex; align-items: center; gap: 0.35rem;
    }
    .comment-toggle span { font-size: 0.85rem; }

    /* ── Comments drawer ── */
    .comments-drawer {
      display: none;
      flex-direction: column;
      max-height: 180px;
      overflow: hidden;
    }
    .comments-drawer.open { display: flex; }

    .comments-list {
      overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 0.4rem;
      padding-bottom: 0.4rem;
    }
    .comments-list::-webkit-scrollbar { width: 3px; }
    .comments-list::-webkit-scrollbar-thumb { background: #333; }

    .comment-item {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 0.4rem 0.6rem;
      font-size: 0.82rem;
    }
    .comment-item strong { color: var(--gold); margin-right: 0.3rem; }
    .comment-item.new { animation: slideIn 0.3s ease; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .comment-form {
      display: flex; gap: 0.4rem; margin-top: 0.4rem;
    }
    .comment-form input {
      flex: 1; background: #1e1e1e; border: 1px solid #333;
      border-radius: 20px; padding: 0.4rem 0.8rem;
      color: #fff; font-size: 0.82rem; outline: none;
    }
    .comment-form input:focus { border-color: var(--gold); }
    .comment-form button {
      background: var(--gold); color: #000;
      border: none; border-radius: 20px;
      padding: 0.4rem 0.9rem; font-size: 0.82rem;
      font-weight: 600; cursor: pointer;
    }

    /* ── Scroll hint ── */
    .scroll-hint {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-size: 0.75rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
      animation: fadeHint 3s 3.5s forwards;
      pointer-events: none; z-index: 10;
    }
    .scroll-hint .arrow { font-size: 1.2rem; animation: bounce 1s infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }
    @keyframes fadeHint { to { opacity: 0; } }

    /* ── Empty ── */
    .empty-state {
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #555; gap: 1rem;
    }
    .empty-state span { font-size: 3rem; }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <p style="color:#666;font-size:0.9rem">Loading memories...</p>
</div>

<div id="hero-splash" style="display:none">
  <div class="cap">🎓</div>
  <h1 id="grad-name"></h1>
  <p>Congratulations on your graduation!</p>
  <div class="gold-line"></div>
</div>

<div id="confetti"></div>

<div id="slides"></div>

<div class="scroll-hint" id="scroll-hint" style="display:none">
  <div class="arrow">↓</div>
  <span>Scroll for more</span>
</div>

<script>
  const slug = location.pathname.split('/gallery/')[1];
  let allPhotos = [];

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function spawnConfetti() {
    const c = document.getElementById('confetti');
    const colors = ['#f9ca24','#f0932b','#6ab04c','#e056fd','#22a6b3','#eb4d4b','#badc58','#f0c040'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'cp';
      el.style.cssText = `left:${Math.random()*100}%;background:${colors[i%colors.length]};
        animation-delay:${Math.random()*2}s;animation-duration:${2+Math.random()*2}s;
        width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;
        border-radius:${Math.random()>.5?'50%':'2px'};opacity:0.9`;
      c.appendChild(el);
    }
  }

  async function loadGallery() {
    const res = await fetch(`/api/gallery/${slug}`);
    document.getElementById('loading-screen').style.display = 'none';

    if (!res.ok) {
      document.getElementById('slides').innerHTML =
        '<div class="empty-state"><span>📭</span><p>Gallery not found.</p></div>';
      return;
    }

    const data = await res.json();
    allPhotos = data.photos;
    document.title = `${data.user.name} — Graduation`;

    // Show hero splash
    document.getElementById('grad-name').textContent = data.user.name;
    document.getElementById('hero-splash').style.display = 'flex';
    spawnConfetti();

    if (!allPhotos.length) {
      document.getElementById('slides').innerHTML =
        '<div class="empty-state"><span>🖼️</span><p>No photos yet.</p></div>';
      return;
    }

    // Build slides
    const container = document.getElementById('slides');
    allPhotos.forEach((photo, i) => {
      container.appendChild(buildSlide(photo, i));
    });

    if (allPhotos.length > 1) {
      document.getElementById('scroll-hint').style.display = 'flex';
    }
  }

  function buildSlide(photo, index) {
    const id = photo._id;
    const slide = document.createElement('div');
    slide.className = 'slide';

    slide.innerHTML = `
      <div class="slide-img">
        <img src="${photo.url}" alt="${escHtml(photo.caption || 'photo')}" loading="${index < 2 ? 'eager' : 'lazy'}" />
        <div class="slide-counter">${index + 1} / ${allPhotos.length}</div>
        ${photo.caption ? `<div class="slide-caption">${escHtml(photo.caption)}</div>` : ''}
      </div>
      <div class="slide-panel">
        <div class="panel-actions">
          <button class="like-btn" id="like-btn-${id}" onclick="toggleLike('${id}', this)" data-liked="false">
            <span class="heart">🤍</span>
          </button>
          <span class="like-count" id="like-count-${id}">${photo.likes} likes</span>
          <button class="comment-toggle" onclick="toggleComments('${id}')">
            💬 <span id="ccount-${id}">${photo.comments.length}</span>
          </button>
        </div>
        <div class="comments-drawer" id="drawer-${id}">
          <div class="comments-list" id="comments-${id}">
            ${photo.comments.map(c => `
              <div class="comment-item">
                <strong>${escHtml(c.name)}</strong>${escHtml(c.message)}
              </div>`).join('')}
          </div>
          <div class="comment-form">
            <input type="text" id="cname-${id}" placeholder="Name · Message" maxlength="80"
              onkeydown="if(event.key==='Enter') quickComment('${id}')" />
            <button onclick="quickComment('${id}')">Post</button>
          </div>
        </div>
      </div>
    `;
    return slide;
  }

  function toggleComments(id) {
    const drawer = document.getElementById(`drawer-${id}`);
    drawer.classList.toggle('open');
    if (drawer.classList.contains('open')) {
      setTimeout(() => {
        const list = document.getElementById(`comments-${id}`);
        list.scrollTop = list.scrollHeight;
        document.getElementById(`cname-${id}`).focus();
      }, 50);
    }
  }

  async function toggleLike(photoId, btn) {
    const heart = btn.querySelector('.heart');
    const liked = btn.dataset.liked === 'true';
    btn.dataset.liked = !liked;
    heart.textContent = !liked ? '❤️' : '🤍';
    btn.classList.toggle('liked', !liked);

    const res = await fetch(`/api/photos/${photoId}/like`, { method: 'POST' });
    const data = await res.json();
    document.getElementById(`like-count-${photoId}`).textContent = `${data.likes} likes`;
  }

  async function quickComment(photoId) {
    const input = document.getElementById(`cname-${photoId}`);
    const val = input.value.trim();
    // Expect "Name · Message" or just split on first space
    const dotIdx = val.indexOf('·');
    let name, message;
    if (dotIdx > 0) {
      name = val.slice(0, dotIdx).trim();
      message = val.slice(dotIdx + 1).trim();
    } else {
      const spaceIdx = val.indexOf(' ');
      if (spaceIdx < 1) { input.style.borderColor='#e94560'; setTimeout(()=>input.style.borderColor='',800); return; }
      name = val.slice(0, spaceIdx).trim();
      message = val.slice(spaceIdx + 1).trim();
    }
    if (!name || !message) { input.style.borderColor='#e94560'; setTimeout(()=>input.style.borderColor='',800); return; }

    const res = await fetch(`/api/photos/${photoId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, message })
    });
    if (res.ok) {
      const c = await res.json();
      const list = document.getElementById(`comments-${photoId}`);
      const div = document.createElement('div');
      div.className = 'comment-item new';
      div.innerHTML = `<strong>${escHtml(c.name)}</strong>${escHtml(c.message)}`;
      list.appendChild(div);
      list.scrollTop = list.scrollHeight;
      input.value = '';
      const cc = document.getElementById(`ccount-${photoId}`);
      cc.textContent = parseInt(cc.textContent) + 1;
    }
  }

  loadGallery();
</script>
</body>
</html>
