<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Graduation Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/gallery.css" />
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
</div>

<div id="hero-splash" style="display:none">
  <div id="confetti"></div>
  <div class="splash-content">
    <div class="cap-icon">🎓</div>
    <h1 id="grad-name"></h1>
    <p class="hero-sub">Congratulations!</p>
    <div class="gold-line"></div>
  </div>
</div>

<!-- ── MOBILE ── -->
<div id="mobile-view">
  <!-- Top bar -->
  <div class="ig-topbar">
    <span class="ig-logo">🎓</span>
    <span class="ig-username" id="ig-username"></span>
  </div>
  <!-- Feed -->
  <div id="ig-feed"></div>
</div>

<!-- ── DESKTOP ── -->
<div id="desktop-view">
  <header class="d-hero">
    <div class="d-hero-bg"></div>
    <div id="confetti-d"></div>
    <div class="d-hero-content">
      <div class="cap-icon">🎓</div>
      <h1 id="grad-name-desktop"></h1>
      <p class="hero-sub">Congratulations on your graduation!</p>
      <div class="gold-line"></div>
    </div>
  </header>
  <main class="d-main">
    <!-- Single photo viewer -->
    <div class="d-viewer">
      <button class="d-nav d-prev" id="d-prev">&#8249;</button>
      <div class="d-photo-panel">
        <div class="d-img-wrap">
          <img id="d-photo" src="" alt="" />
        </div>
      </div>
      <button class="d-nav d-next" id="d-next">&#8250;</button>
      <div class="d-side-panel">
        <!-- Header -->
        <div class="d-side-header">
          <div class="d-avatar">🎓</div>
          <div>
            <div class="d-side-name" id="d-side-name"></div>
            <div class="d-side-counter" id="d-side-counter"></div>
          </div>
        </div>
        <!-- Caption -->
        <div class="d-caption" id="d-caption"></div>
        <!-- Comments -->
        <div class="d-comments-list" id="d-comments-list"></div>
        <!-- Actions -->
        <div class="d-actions">
          <button class="d-like-btn" id="d-like-btn" onclick="dLike()">
            <span class="heart" id="d-heart">🤍</span>
            <span id="d-like-count">0 likes</span>
          </button>
        </div>
        <!-- Comment form -->
        <div class="d-comment-form">
          <input type="text" id="d-cname" placeholder="Your name" maxlength="50" />
          <div class="d-input-row">
            <input type="text" id="d-cmsg" placeholder="Add a comment..." maxlength="300"
              onkeydown="if(event.key==='Enter') dPost()" />
            <button class="d-post-btn" onclick="dPost()">Post</button>
          </div>
        </div>
        <!-- Dots -->
        <div class="d-dots" id="d-dots"></div>
      </div>
    </div>
  </main>
</div>

<!-- ── COMMENT SHEET (mobile) ── -->
<div class="comment-sheet" id="comment-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span>Comments</span>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-comments" id="sheet-comments"></div>
  <div class="sheet-input-row">
    <input type="text" id="sheet-name" placeholder="Your name" />
    <input type="text" id="sheet-msg" placeholder="Add a comment..." />
    <button id="sheet-post" onclick="postSheetComment()">Post</button>
  </div>
</div>
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>

<script src="/gallery.js"></script>
</body>
</html>
